# Файл: /etc/nginx/sites-available/api.elearning.aqlant.com
# sudo ln -s /etc/nginx/sites-available/api.elearning.aqlant.com /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# sudo certbot --nginx -d api.elearning.aqlant.com

server {
    listen 80;
    server_name api.elearning.aqlant.com;
    client_max_body_size 80M;

    location /static/ {
        alias /home/ubuntu/aqlant-lms/backend/staticfiles/;
    }

    location /media/ {
        alias /home/ubuntu/aqlant-lms/backend/media/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/aqlant-api/gunicorn.sock:;
        proxy_redirect off;
    }
}
