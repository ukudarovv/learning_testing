# Файл: /etc/nginx/sites-available/elearning.aqlant.com
# Сборка фронта: VITE_API_URL=https://api.elearning.aqlant.com/api npm run build
# Корень — каталог dist после сборки

server {
    listen 80;
    server_name elearning.aqlant.com;
    root /home/ubuntu/aqlant-lms/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
